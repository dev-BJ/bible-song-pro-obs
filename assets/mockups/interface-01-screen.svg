<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="title">
  <title id="title">Bible Song Pro interface screenshot in MacBook-style display frame</title>
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20242c"/>
      <stop offset="100%" stop-color="#111319"/>
    </linearGradient>
    <linearGradient id="screenEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#313641"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1600" height="1040" fill="#0b0d12"/>
  <g filter="url(#shadow)">
    <rect x="120" y="72" width="1360" height="860" rx="42" fill="url(#shell)"/>
    <rect x="148" y="100" width="1304" height="804" rx="28" fill="url(#screenEdge)"/>
    <image href="../../Bible Song Pro_Screenshot/Interface 01.png" x="176" y="128" width="1248" height="748" preserveAspectRatio="xMidYMid slice"/>
    <rect x="690" y="100" width="220" height="26" rx="0 0 14 14" fill="#0f1117"/>
    <circle cx="800" cy="112" r="5" fill="#242a34"/>
  </g>
</svg>
