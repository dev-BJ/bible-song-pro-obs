<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bible Song Pro Feature Tour</title>
  <link rel="stylesheet" href="feature-tour.css">
</head>
<body>
  <div class="tour-shell">
    <button class="tour-close" type="button" id="tour-close" aria-label="Close">×</button>

    <aside class="tour-sidebar">
      <div class="feature-list" id="feature-list"></div>

      <div class="tour-nav">
        <button class="nav-btn" type="button" id="nav-up" aria-label="Previous feature">⌃</button>
        <button class="nav-btn" type="button" id="nav-down" aria-label="Next feature">⌄</button>
      </div>

      <section class="feature-detail" id="feature-detail">
        <h2 id="feature-detail-title"></h2>
        <p id="feature-detail-copy"></p>
      </section>
    </aside>

    <main class="tour-stage">
      <div class="screen-wrap">
        <div class="screen-frame">
          <div class="screen-bezel">
            <div class="screen-notch"></div>
            <div class="screen-camera"></div>
            <img id="feature-screen" alt="" src="">
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="feature-tour.js"></script>
</body>
</html>
